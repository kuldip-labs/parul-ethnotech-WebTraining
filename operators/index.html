<!DOCTYPE html>
<html>
<head><title>Operators Demo</title></head>
<body style="font-family: sans-serif; padding: 20px; background:#f8f9fa">
<h2>JavaScript Operators</h2>
<p id="result"></p>
<script>
  // Arithmetic Operators
  let a = 10;
  let b = 5;
  let sum = a + b; // Addition
  let difference = a - b; // Subtraction
  let product = a * b; // Multiplication
  let quotient = a / b; // Division
  let remainder = a % b; // Modulus

  // Assignment Operators
  let c = 20;
  c += 5; // c is now 25
  c -= 3; // c is now 22
  c *= 2; // c is now 44
  c /= 4; // c is now 11

  // Comparison Operators
  let isEqual = (a == b); // false
  let isNotEqual = (a != b); // true
  let isGreaterThan = (a > b); // true
  let isLessThan = (a < b); // false

  // Logical Operators
  let x = true;
  let y = false;
  let andResult = x && y; // false
  let orResult = x || y; // true
  let notResult = !x; // false

  document.getElementById('result').innerHTML =
    `<strong>Arithmetic Operators:</strong><br>
     Sum: ${sum}<br>
     Difference: ${difference}<br>
     Product: ${product}<br>
     Quotient: ${quotient}<br>
     Remainder: ${remainder}<br><br>

     <strong>Assignment Operators:</strong><br>
     Final value of c: ${c}<br><br>

     <strong>Comparison Operators:</strong><br>
     Is Equal: ${isEqual}<br>
     Is Not Equal: ${isNotEqual}<br>
     Is Greater Than: ${isGreaterThan}<br>
     Is Less Than: ${isLessThan}<br><br>

     <strong>Logical Operators:</strong><br>
     AND Result: ${andResult}<br>
     OR Result: ${orResult}<br>
     NOT Result: ${notResult}`;
</script>
</body>
</html>
